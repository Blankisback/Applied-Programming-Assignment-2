<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreamFlix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1 class="logo">STREAMFLIX</h1>

  <nav>
    <a href="#">Home</a>
    <a href="#">Shows</a>
    <a href="#">Movies</a>
    <a href="#">New + Popular</a>
    <a href="#">My List</a>
  </nav>

  <input type="text" id="search" placeholder="Search movies...">
  <button id="toggle">Dark Mode</button>
  <button onclick="window.location.href='login.html'">Sign In</button>
</header>

<section>
  <h2>Currently trending now</h2>
  <div id="trending" class="row"></div>
</section>

<section>
  <h2>Action</h2>
  <div id="action" class="row"></div>
</section>

<section>
  <h2>Comedy</h2>
  <div id="comedy" class="row"></div>
</section>

<section>
  <h2>Sci-Fi</h2>
  <div id="scifi" class="row"></div>
</section>

<div id="searchOverlay" class="overlay hidden">
  <div class="overlay-content">
    <span id="closeSearch">&times;</span>
    <h2>Search Results</h2>
    <div id="searchResults" class="row"></div>
  </div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <h2 id="modalTitle"></h2>
    <p id="modalRuntime"></p>
    <p id="modalPlot"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
