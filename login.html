<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div style="padding:20px; max-width:400px; margin:auto;">
  <h2>Login / Register</h2>

  </form>

  <br>
  <button onclick="window.location.href='index.html'">Back</button>
</div>

</body>
</html>
