<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreamFlix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-page">
  <header class="login-header">
    <h1 class="login-logo" onclick="window.location.href='index.html'">STREAMFLIX</h1>
  </header>

  <div class="login-container">
    <div class="login-box">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to continue watching</p>

      <form onsubmit="return false;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="divider">or</div>

      <button class="btn-back" onclick="window.location.href='index.html'">← Back to StreamFlix</button>
    </div>
  </div>
</div>

</body>
</html>
